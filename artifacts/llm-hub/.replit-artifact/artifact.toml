kind = "web"
previewPath = "/"
title = "LLM Hub"
version = "1.0.0"
id = "artifacts/llm-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18237
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/llm-hub run dev"

[services.env]
PORT = "18237"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/llm-hub", "run", "build"]
publicDir = "artifacts/llm-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
