kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
# Build the frontend and the API server. Workbench sandbox posture is
# verified at runtime, not build time: the build host and the deploy
# host are different machines, so a build-time `bwrap` probe doesn't
# reflect production. The api-server already logs the detected sandbox
# helper at boot, exposes it on the admin /api/monitor/sandbox
# endpoint, and emits a `sandbox_degraded` SSE alert from
# /api/health/events when production is on the path-validation-only
# fallback. See artifacts/api-server/scripts/sandbox-smoke-test.ts to
# probe a host manually.
build = "pnpm --filter @workspace/llm-hub run build && pnpm --filter @workspace/api-server run build"

[services.production.run]
args = ["node", "artifacts/api-server/dist/index.cjs"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
