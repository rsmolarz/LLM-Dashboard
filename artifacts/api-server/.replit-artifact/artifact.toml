kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/"]

[services.development]
run = "WORKBENCH_E2E_AUTH=1 pnpm --filter @workspace/api-server run dev"

[services.production]
# The first step is a deploy gate: it verifies the Workbench OS-level
# sandbox (bwrap / firejail / nsjail) actually contains writes on the
# deploy host. If the host has lost `bwrap` or unprivileged user
# namespaces are disabled, the Workbench shell would silently fall
# back to path-validation-only protection — failing this step stops
# the deploy with a clear log line pointing at
# artifacts/api-server/scripts/sandbox-smoke-test.ts.
build = "echo '[deploy-gate] running Workbench OS-sandbox gate (artifacts/api-server/scripts/sandbox-smoke-test.ts)' && (pnpm --filter @workspace/api-server run smoke:sandbox || (echo '[deploy-gate] FAIL: Workbench OS-sandbox gate failed — aborting deploy. See artifacts/api-server/scripts/sandbox-smoke-test.ts.' >&2; exit 1)) && pnpm --filter @workspace/llm-hub run build && pnpm --filter @workspace/api-server run build"

[services.production.run]
args = ["node", "artifacts/api-server/dist/index.cjs"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
