openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: llm-config
    description: LLM server configuration
  - name: llm-proxy
    description: Proxy to local Ollama server
  - name: llm-models
    description: Model management
  - name: chat
    description: Chat history
  - name: model-profiles
    description: Custom model profiles
  - name: training-data
    description: Training data collection
  - name: rag
    description: RAG knowledge base
  - name: scan
    description: Gmail and Google Drive scanning
  - name: vps-database
    description: VPS PostgreSQL database management
  - name: vps-training
    description: VPS training data collection and management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /llm/config:
    get:
      operationId: getLlmConfig
      tags: [llm-config]
      summary: Get LLM server configuration
      responses:
        "200":
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConfig"
    put:
      operationId: saveLlmConfig
      tags: [llm-config]
      summary: Save LLM server configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmConfigInput"
      responses:
        "200":
          description: Saved configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConfig"

  /llm/status:
    get:
      operationId: getLlmStatus
      tags: [llm-proxy]
      summary: Get Ollama server status
      responses:
        "200":
          description: Server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmStatus"

  /llm/models:
    get:
      operationId: listModels
      tags: [llm-models]
      summary: List models available on Ollama
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OllamaModel"

  /llm/models/pull:
    post:
      operationId: pullModel
      tags: [llm-models]
      summary: Pull a model from Ollama registry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullModelInput"
      responses:
        "200":
          description: Pull status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullModelResponse"

  /llm/models/{name}:
    delete:
      operationId: deleteModel
      tags: [llm-models]
      summary: Delete a model from Ollama
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Model deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteModelResponse"

  /llm/models/running:
    get:
      operationId: listRunningModels
      tags: [llm-models]
      summary: List currently running models
      responses:
        "200":
          description: List of running models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunningModel"

  /llm/chat:
    post:
      operationId: sendChatMessage
      tags: [llm-proxy]
      summary: Send a chat completion request to Ollama
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /llm/setup-script:
    get:
      operationId: getLlmSetupScript
      tags: [llm-config]
      summary: Generate setup script for Ollama
      responses:
        "200":
          description: Bash script content
          content:
            text/plain:
              schema:
                type: string

  /chat/conversations:
    get:
      operationId: listConversations
      tags: [chat]
      summary: List all chat conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [chat]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /chat/conversations/{id}:
    delete:
      operationId: deleteConversation
      tags: [chat]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chat/conversations/{id}/messages:
    get:
      operationId: getMessages
      tags: [chat]
      summary: Get messages for a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: addMessage
      tags: [chat]
      summary: Add a message to a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMessageInput"
      responses:
        "201":
          description: Added message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /chat/messages/{messageId}/rate:
    patch:
      operationId: rateMessage
      tags: [chat]
      summary: Rate a chat message
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateMessageInput"
      responses:
        "200":
          description: Rated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /model-profiles:
    get:
      operationId: listModelProfiles
      tags: [model-profiles]
      summary: List all custom model profiles
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelProfile"
    post:
      operationId: createModelProfile
      tags: [model-profiles]
      summary: Create a new model profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelProfileInput"
      responses:
        "201":
          description: Created profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProfile"

  /model-profiles/{id}:
    put:
      operationId: updateModelProfile
      tags: [model-profiles]
      summary: Update a model profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProfile"
    delete:
      operationId: deleteModelProfile
      tags: [model-profiles]
      summary: Delete a model profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /model-profiles/{id}/deploy:
    post:
      operationId: deployModelProfile
      tags: [model-profiles]
      summary: Deploy a profile to Ollama as a custom Modelfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deploy result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployProfileResponse"

  /training/data:
    get:
      operationId: listTrainingData
      tags: [training-data]
      summary: List training data entries
      responses:
        "200":
          description: Training data list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingDataEntry"
    post:
      operationId: addTrainingData
      tags: [training-data]
      summary: Add a training data entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingDataInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingDataEntry"

  /training/data/{id}:
    delete:
      operationId: deleteTrainingData
      tags: [training-data]
      summary: Delete a training data entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /training/data/export:
    post:
      operationId: exportTrainingData
      tags: [training-data]
      summary: Export training data as JSONL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportTrainingDataInput"
      responses:
        "200":
          description: JSONL export
          content:
            application/jsonl:
              schema:
                type: string

  /training/data/collect:
    post:
      operationId: collectFromConversation
      tags: [training-data]
      summary: Collect training pairs from a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectTrainingInput"
      responses:
        "200":
          description: Collected pairs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectTrainingResponse"

  /training/stats:
    get:
      operationId: getTrainingStats
      tags: [training-data]
      summary: Get training data statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingStats"

  /rag/documents:
    get:
      operationId: listDocuments
      tags: [rag]
      summary: List all knowledge base documents
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RagDocument"
    post:
      operationId: createDocument
      tags: [rag]
      summary: Upload a document to the knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentInput"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagDocument"

  /rag/documents/{id}:
    delete:
      operationId: deleteDocument
      tags: [rag]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /rag/search:
    post:
      operationId: searchDocuments
      tags: [rag]
      summary: Search knowledge base for relevant chunks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchDocumentsInput"
      responses:
        "200":
          description: Matching chunks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResult"

  /rag/stats:
    get:
      operationId: getRagStats
      tags: [rag]
      summary: Get knowledge base statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagStats"

  /rag/fetch-url:
    post:
      operationId: fetchUrl
      tags: [rag]
      summary: Fetch content from a URL for knowledge base import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
      responses:
        "200":
          description: Fetched content
          content:
            application/json:
              schema:
                type: object
                required: [title, content, contentLength, sourceUrl]
                properties:
                  title:
                    type: string
                  content:
                    type: string
                  contentLength:
                    type: integer
                  sourceUrl:
                    type: string

  /rag/bulk-import:
    post:
      operationId: bulkImportDocuments
      tags: [rag]
      summary: Bulk import multiple documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documents]
              properties:
                documents:
                  type: array
                  items:
                    type: object
                    required: [title, content]
                    properties:
                      title:
                        type: string
                      content:
                        type: string
                      category:
                        type: string
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                type: object
                required: [total, succeeded, failed, results]
                properties:
                  total:
                    type: integer
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      required: [title, id, chunksCount, status]
                      properties:
                        title:
                          type: string
                        id:
                          type: integer
                        chunksCount:
                          type: integer
                        status:
                          type: string
                          enum: [success, error]
                        error:
                          type: string

  /rag/discovery/sources:
    get:
      operationId: listDiscoveredSources
      tags: [rag]
      summary: List discovered knowledge base sources
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, imported]
      responses:
        "200":
          description: List of discovered sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscoveredSource"

  /rag/discovery/run:
    post:
      operationId: runDiscovery
      tags: [rag]
      summary: Run the discovery agent to find new knowledge base sources
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: string
                customPrompt:
                  type: string
      responses:
        "200":
          description: Discovery results
          content:
            application/json:
              schema:
                type: object
                required: [category, discovered, skipped, sources, skippedReasons]
                properties:
                  category:
                    type: string
                  discovered:
                    type: integer
                  skipped:
                    type: integer
                  sources:
                    type: array
                    items:
                      type: object
                      required: [id, title, url]
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        url:
                          type: string
                  skippedReasons:
                    type: array
                    items:
                      type: string

  /rag/discovery/sources/{id}:
    patch:
      operationId: updateDiscoveredSource
      tags: [rag]
      summary: Update discovered source status (approve/reject/import)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [approved, rejected, imported]
      responses:
        "200":
          description: Updated source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveredSource"
    delete:
      operationId: deleteDiscoveredSource
      tags: [rag]
      summary: Delete a discovered source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean

  /rag/discovery/stats:
    get:
      operationId: getDiscoveryStats
      tags: [rag]
      summary: Get discovery agent statistics
      responses:
        "200":
          description: Discovery stats
          content:
            application/json:
              schema:
                type: object
                required: [total, pending, approved, rejected, imported, byCategory]
                properties:
                  total:
                    type: integer
                  pending:
                    type: integer
                  approved:
                    type: integer
                  rejected:
                    type: integer
                  imported:
                    type: integer
                  byCategory:
                    type: object
                    additionalProperties:
                      type: integer

  /openclaw/config:
    get:
      operationId: getOpenclawConfig
      tags: [openclaw]
      summary: Get OpenClaw gateway configuration
      responses:
        "200":
          description: Current config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenclawConfig"
    put:
      operationId: updateOpenclawConfig
      tags: [openclaw]
      summary: Update OpenClaw gateway configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenclawConfigInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenclawConfig"

  /openclaw/gateway/status:
    get:
      operationId: getGatewayStatus
      tags: [openclaw]
      summary: Get OpenClaw gateway health and status
      responses:
        "200":
          description: Gateway status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayStatus"

  /openclaw/agents:
    get:
      operationId: listAgents
      tags: [openclaw]
      summary: List all agents
      responses:
        "200":
          description: Agents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentEntry"
    post:
      operationId: createAgent
      tags: [openclaw]
      summary: Create a new agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentInput"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentEntry"

  /openclaw/agents/{agentId}:
    get:
      operationId: getAgent
      tags: [openclaw]
      summary: Get agent details
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentEntry"
    put:
      operationId: updateAgent
      tags: [openclaw]
      summary: Update an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentInput"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentEntry"
    delete:
      operationId: deleteAgent
      tags: [openclaw]
      summary: Delete an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /openclaw/agents/{agentId}/chat:
    post:
      operationId: chatWithAgent
      tags: [openclaw]
      summary: Send a message to an agent via OpenClaw gateway
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentChatInput"
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentChatResponse"

  /openclaw/agents/{agentId}/logs:
    get:
      operationId: getAgentLogs
      tags: [openclaw]
      summary: Get agent activity logs
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Agent logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentLogEntry"

  /openclaw/stats:
    get:
      operationId: getOpenclawStats
      tags: [openclaw]
      summary: Get fleet statistics
      responses:
        "200":
          description: Fleet stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetStats"

  /openclaw/setup-script:
    get:
      operationId: getOpenclawSetupScript
      tags: [openclaw]
      summary: Generate OpenClaw VPS setup script
      responses:
        "200":
          description: Bash setup script
          content:
            text/plain:
              schema:
                type: string

  /openclaw/agents/{agentId}/memories:
    get:
      operationId: listAgentMemories
      tags: [openclaw]
      summary: List memories for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Agent memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentMemoryEntry"
    post:
      operationId: addAgentMemory
      tags: [openclaw]
      summary: Add a memory for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemoryInput"
      responses:
        "201":
          description: Created memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentMemoryEntry"

  /openclaw/agents/{agentId}/memories/{memoryId}:
    delete:
      operationId: deleteAgentMemory
      tags: [openclaw]
      summary: Delete an agent memory
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - name: memoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /openclaw/agents/{agentId}/memories/extract:
    post:
      operationId: extractMemoriesFromChat
      tags: [openclaw]
      summary: Auto-extract facts and summaries from agent chat history
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractMemoriesInput"
      responses:
        "200":
          description: Extracted memories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractMemoriesResponse"

  /openclaw/tasks:
    get:
      operationId: listAgentTasks
      tags: [openclaw]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: agentId
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentTaskEntry"
    post:
      operationId: createAgentTask
      tags: [openclaw]
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskInput"
      responses:
        "201":
