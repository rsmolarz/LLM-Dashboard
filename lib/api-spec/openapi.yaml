          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskInput"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentTaskEntry"
    delete:
      operationId: deleteAgentTask
      tags: [openclaw]
      summary: Delete a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /openclaw/tasks/{taskId}/complete:
    post:
      operationId: completeAgentTask
      tags: [openclaw]
      summary: Mark a task as complete with result
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTaskInput"
      responses:
        "200":
          description: Completed task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentTaskEntry"

  /openclaw/tasks/route:
    post:
      operationId: routeTask
      tags: [openclaw]
