      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteTaskInput"
      responses:
        "200":
          description: Routing result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteTaskResponse"

  /scan/gmail:
    post:
      operationId: scanGmail
      tags: [scan]
      summary: Search Gmail messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: Gmail search query
                maxResults:
                  type: integer
                  default: 20
      responses:
        "200":
          description: Gmail search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GmailScanResponse"
        "502":
          description: Gmail connection error

  /scan/gmail/message:
    post:
      operationId: scanGmailMessage
      tags: [scan]
      summary: Get full Gmail message body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messageId:
                  type: string
              required:
                - messageId
      responses:
        "200":
          description: Full message content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GmailMessageDetail"
        "400":
          description: Missing messageId

  /scan/drive:
    post:
      operationId: scanDrive
      tags: [scan]
      summary: Search Google Drive files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: Search query for Drive
                maxResults:
                  type: integer
                  default: 20
      responses:
        "200":
          description: Drive search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveScanResponse"
        "502":
          description: Drive connection error

  /scan/drive/content:
    post:
      operationId: scanDriveContent
      tags: [scan]
      summary: Get Google Drive file content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fileId:
                  type: string
              required:
                - fileId
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveFileContent"
        "400":
          description: Missing fileId

  /vps-database/config:
    get:
      operationId: getVpsDatabaseConfig
      tags: [vps-database]
      summary: Get VPS database configuration
      responses:
        "200":
          description: VPS database config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpsDatabaseConfig"
    put:
      operationId: saveVpsDatabaseConfig
      tags: [vps-database]
      summary: Update VPS database configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpsDatabaseConfigInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpsDatabaseConfig"

  /vps-database/test:
    post:
      operationId: testVpsDatabase
      tags: [vps-database]
      summary: Test VPS database connectivity
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpsDatabaseTestResult"

  /vps-database/setup-script:
    get:
      operationId: getVpsDatabaseSetupScript
      tags: [vps-database]
      summary: Get VPS PostgreSQL setup script
      responses:
        "200":
          description: Bash setup script
          content:
            text/plain:
              schema:
                type: string

  /vps-training/init:
    post:
      operationId: initVpsTraining
      tags: [vps-training]
      summary: Initialize VPS training tables
      responses:
        "200":
          description: Init result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpsTrainingInitResult"

  /vps-training/sources:
    get:
      operationId: listVpsTrainingSources
      tags: [vps-training]
      summary: List training sources from VPS
      parameters:
        - name: source_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Training sources list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpsTrainingSourcesList"
    post:
      operationId: saveVpsTrainingSources
      tags: [vps-training]
      summary: Save training sources to VPS database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/VpsTrainingSourceInput"
                - type: array
                  items:
                    $ref: "#/components/schemas/VpsTrainingSourceInput"
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpsTrainingSaveResult"

  /vps-training/sources/{id}:
    get:
      operationId: getVpsTrainingSource
      tags: [vps-training]
      summary: Get a single training source with full content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Training source detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpsTrainingSource"
    put:
      operationId: updateVpsTrainingSource
      tags: [vps-training]
      summary: Update training source status or quality
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                quality:
                  type: integer
      responses:
        "200":
          description: Updated source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpsTrainingSource"
    delete:
      operationId: deleteVpsTrainingSource
      tags: [vps-training]
      summary: Delete a training source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /vps-training/stats:
    get:
      operationId: getVpsTrainingStats
      tags: [vps-training]
      summary: Get VPS training data statistics
      responses:
        "200":
          description: Training stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpsTrainingStats"

  /vps-training/export:
    post:
      operationId: exportVpsTrainingData
      tags: [vps-training]
      summary: Export VPS training data as JSONL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  enum: [openai, alpaca, raw]
                  default: openai
                minQuality:
                  type: integer
                  default: 0
                sourceType:
                  type: string
      responses:
        "200":
          description: JSONL export
          content:
            application/jsonl:
              schema:
                type: string

