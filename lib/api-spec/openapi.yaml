openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: llm-config
    description: LLM server configuration
  - name: llm-proxy
    description: Proxy to local Ollama server
  - name: llm-models
    description: Model management
  - name: chat
    description: Chat history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /llm/config:
    get:
      operationId: getLlmConfig
      tags: [llm-config]
      summary: Get LLM server configuration
      responses:
        "200":
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConfig"
    put:
      operationId: saveLlmConfig
      tags: [llm-config]
      summary: Save LLM server configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmConfigInput"
      responses:
        "200":
          description: Saved configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConfig"

  /llm/status:
    get:
      operationId: getLlmStatus
      tags: [llm-proxy]
      summary: Get Ollama server status (health, running models, version)
      responses:
        "200":
          description: Server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmStatus"

  /llm/models:
    get:
      operationId: listModels
      tags: [llm-models]
      summary: List models available on the Ollama server
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OllamaModel"

  /llm/models/pull:
    post:
      operationId: pullModel
      tags: [llm-models]
      summary: Pull a model from the Ollama registry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullModelInput"
      responses:
        "200":
          description: Pull status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullModelResponse"

  /llm/models/{name}:
    delete:
      operationId: deleteModel
      tags: [llm-models]
      summary: Delete a model from the Ollama server
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Model deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteModelResponse"

  /llm/models/running:
    get:
      operationId: listRunningModels
      tags: [llm-models]
      summary: List currently running/loaded models
      responses:
        "200":
          description: List of running models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunningModel"

  /llm/chat:
    post:
      operationId: sendChatMessage
      tags: [llm-proxy]
      summary: Send a chat completion request to the Ollama server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /llm/setup-script:
    get:
      operationId: getSetupScript
      tags: [llm-config]
      summary: Generate a bash setup script for Ollama + OpenWebUI
      responses:
        "200":
          description: Bash script content
          content:
            text/plain:
              schema:
                type: string

  /chat/conversations:
    get:
      operationId: listConversations
      tags: [chat]
      summary: List all chat conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [chat]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /chat/conversations/{id}:
    delete:
      operationId: deleteConversation
      tags: [chat]
      summary: Delete a conversation and its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chat/conversations/{id}/messages:
    get:
      operationId: getMessages
      tags: [chat]
      summary: Get messages for a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: addMessage
      tags: [chat]
      summary: Add a message to a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMessageInput"
      responses:
        "201":
          description: Added message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LlmConfig:
      type: object
      properties:
        id:
          type: integer
        serverUrl:
          type: string
        port:
          type: integer
        gpuEnabled:
          type: boolean
        defaultModel:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - serverUrl
        - port
        - gpuEnabled
        - defaultModel
        - createdAt
        - updatedAt

    LlmConfigInput:
      type: object
      properties:
        serverUrl:
          type: string
        port:
          type: integer
        gpuEnabled:
          type: boolean
        defaultModel:
          type: string
      required:
        - serverUrl
        - port
        - gpuEnabled
        - defaultModel

    LlmStatus:
      type: object
      properties:
        online:
          type: boolean
        serverHealth:
          type: string
        version:
          type: ["string", "null"]
        modelsCount:
          type: integer
        runningModels:
          type: array
          items:
            type: string
        error:
          type: ["string", "null"]
      required:
        - online
        - serverHealth

    OllamaModel:
      type: object
      properties:
        name:
          type: string
        size:
          type: number
        digest:
          type: string
        modifiedAt:
          type: string
        parameterSize:
          type: ["string", "null"]
        quantizationLevel:
          type: ["string", "null"]
        family:
          type: ["string", "null"]
      required:
        - name
        - size
        - digest
        - modifiedAt

    RunningModel:
      type: object
      properties:
        name:
          type: string
        size:
          type: number
        sizeVram:
          type: number
        expiresAt:
          type: string
      required:
        - name
        - size
        - sizeVram
        - expiresAt

    PullModelInput:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    PullModelResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    DeleteModelResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ChatRequest:
      type: object
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatRequestMessage"
        temperature:
          type: number
      required:
        - model
        - messages

    ChatRequestMessage:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
      required:
        - role
        - content

    ChatResponse:
      type: object
      properties:
        content:
          type: string
        model:
          type: ["string", "null"]
        totalDuration:
          type: ["number", "null"]
        evalCount:
          type: ["integer", "null"]
      required:
        - content

    Conversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        model:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - model
        - createdAt
        - updatedAt

    CreateConversationInput:
      type: object
      properties:
        title:
          type: string
        model:
          type: string
      required:
        - title
        - model

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    AddMessageInput:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
      required:
        - role
        - content
